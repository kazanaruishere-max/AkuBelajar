# AkuBelajar — Docker Compose (Local Development)
# Usage: docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: akubelajar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: akubelajar
      POSTGRES_PASSWORD: localdev123
      POSTGRES_DB: akubelajar_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U akubelajar -d akubelajar_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: akubelajar-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
